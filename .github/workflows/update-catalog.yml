name: Update Mercadona catalog

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-mercadona-catalog
  cancel-in-progress: false

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape and validate catalog
        run: node scripts/update-catalog.mjs

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- data/products.json data/categories.json; then
            echo "No catalog changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/categories.json
          git commit -m "Actualizar catálogo de Mercadona"
          git push
